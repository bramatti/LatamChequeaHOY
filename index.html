<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LatamChequea HOY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1008;
    --ink2: #3d2f1e;
    --ink3: #7a6652;
    --paper: #f7f3ec;
    --paper2: #ede8df;
    --paper3: #e0d9ce;
    --red: #c0392b;
    --red2: #e74c3c;
    --gold: #b8860b;
    --rule: #c5b89a;
  }

  html { background: var(--paper); color: var(--ink); font-family: 'DM Sans', sans-serif; }

  body { min-height: 100vh; }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0;
    border-bottom: 4px solid var(--red);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 2rem;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  .header-date { color: rgba(255,255,255,0.5); }

  .header-status {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--red2);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .header-main {
    padding: 1.2rem 2rem 1rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(2rem, 5vw, 3.2rem);
    line-height: 1;
    color: #fff;
    letter-spacing: -0.02em;
  }

  .brand-name span {
    color: var(--red2);
  }

  .brand-tagline {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-shrink: 0;
  }

  .btn-refresh {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.75);
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-refresh:hover { border-color: rgba(255,255,255,0.6); color: #fff; }
  .btn-refresh:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── FILTER BAR ── */
  .filter-bar {
    background: var(--paper2);
    border-bottom: 1px solid var(--rule);
    padding: 0.6rem 2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink3);
    flex-shrink: 0;
    margin-right: 4px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink2);
    padding: 4px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .filter-btn:hover { background: var(--paper3); }
  .filter-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* ── MAIN ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 2rem 4rem;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 0.75rem;
    margin-bottom: 1.5rem;
    border-bottom: 2px solid var(--ink);
  }

  .stats-info {
    font-size: 12px;
    color: var(--ink3);
    letter-spacing: 0.04em;
  }

  .stats-count {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink2);
  }

  /* ── NEWS GRID ── */
  #news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 0;
  }

  /* ── NEWS CARD ── */
  .news-card {
    border: 1px solid var(--rule);
    margin: -1px -1px 0 0;
    padding: 1.25rem;
    background: var(--paper);
    position: relative;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .news-card:hover { background: var(--paper2); }

  .card-source {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .source-logo {
    height: 18px;
    width: auto;
    max-width: 80px;
    object-fit: contain;
    filter: grayscale(0.3);
    opacity: 0.9;
  }

  .source-logo-fallback {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--ink3);
    background: var(--paper3);
    padding: 2px 6px;
    border-radius: 2px;
  }

  .card-date {
    font-size: 10px;
    color: var(--ink3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-left: auto;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.05rem;
    line-height: 1.3;
    color: var(--ink);
  }

  .card-excerpt {
    font-family: 'Source Serif 4', serif;
    font-weight: 300;
    font-size: 0.875rem;
    line-height: 1.6;
    color: var(--ink2);
    flex: 1;
  }

  .card-footer {
    padding-top: 0.5rem;
    border-top: 1px solid var(--paper3);
    display: flex;
    justify-content: flex-end;
  }

  .lea-mas {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--red);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: gap 0.15s;
  }

  .lea-mas:hover { gap: 8px; }

  .lea-mas::after {
    content: '→';
    font-size: 13px;
  }

  /* ── FEATURED (first card) ── */
  .news-card.featured {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    gap: 0 2rem;
    align-items: start;
    padding: 1.5rem 1.5rem;
    border-top: 3px solid var(--red);
  }

  .featured .card-left {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .featured .card-right {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    padding-left: 2rem;
  }

  .featured .divider-vert {
    background: var(--rule);
    align-self: stretch;
  }

  .featured .card-title {
    font-size: 1.6rem;
  }

  .featured .card-excerpt {
    font-size: 1rem;
  }

  /* ── LOADING / ERROR ── */
  .state-msg {
    grid-column: 1 / -1;
    padding: 4rem 2rem;
    text-align: center;
    color: var(--ink3);
  }

  .state-msg .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--rule);
    border-top-color: var(--ink2);
    border-radius: 50%;
    margin: 0 auto 1rem;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .state-msg p { font-size: 0.9rem; }

  /* ── FOOTER ── */
  footer {
    background: var(--ink);
    color: rgba(255,255,255,0.35);
    text-align: center;
    padding: 1.5rem;
    font-size: 11px;
    letter-spacing: 0.06em;
  }

  footer a { color: rgba(255,255,255,0.5); text-decoration: none; }

  /* ── COUNTDOWN ── */
  .countdown {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.06em;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 680px) {
    .header-main { flex-direction: column; align-items: flex-start; }
    .header-top, .header-main, main, .filter-bar { padding-left: 1rem; padding-right: 1rem; }
    .featured { grid-template-columns: 1fr; }
    .featured .divider-vert { display: none; }
    .featured .card-right { padding-left: 0; border-top: 1px solid var(--rule); padding-top: 0.75rem; }
    #news-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="header-date" id="header-date"></span>
    <div class="header-status">
      <div class="dot"></div>
      <span id="status-text">En vivo</span>
    </div>
  </div>
  <div class="header-main">
    <div class="brand">
      <div class="brand-name">LatamChequea <span>HOY</span></div>
      <div class="brand-tagline">Periodismo de verificación en América Latina</div>
    </div>
    <div class="header-controls">
      <span class="countdown" id="countdown"></span>
      <button class="btn-refresh" id="btn-refresh" onclick="refreshAll()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        Actualizar
      </button>
    </div>
  </div>
</header>

<div class="filter-bar" id="filter-bar">
  <span class="filter-label">Filtrar:</span>
  <button class="filter-btn active" data-source="all" onclick="filterBySource('all', this)">Todos</button>
</div>

<main>
  <div class="stats-bar">
    <span class="stats-info" id="last-update">Cargando fuentes…</span>
    <span class="stats-count" id="stats-count"></span>
  </div>
  <div id="news-grid">
    <div class="state-msg">
      <div class="spinner"></div>
      <p>Cargando noticias…</p>
    </div>
  </div>
</main>

<footer>
  <p>LatamChequea HOY &nbsp;·&nbsp; Verificación periodística en América Latina</p>
</footer>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// Substitua pelo ID da sua planilha publicada
// A planilha deve ter 3 colunas: Nome do veículo | URL do RSS | URL do logotipo
// Publique a planilha como CSV: Arquivo > Compartilhar > Publicar na web > CSV
const SHEET_ID = '1-0F4xw_WTAiB3vCHEtq4an4NEFlPRozOF8O5-Ym1tss';
const SHEET_TAB = 'RSS'; // nome da aba
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_TAB)}`;

const REFRESH_INTERVAL_MS = 30 * 60 * 1000; // 30 minutos
const MAX_ITEMS_PER_FEED = 5;

// ── STATE ────────────────────────────────────────────────────────────────────
let allItems = [];
let sources = [];
let activeSource = 'all';
let countdownTimer = null;
let nextRefresh = null;

// ── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  updateHeaderDate();
  refreshAll();
  startCountdown();
});

function startCountdown() {
  clearInterval(countdownTimer);
  nextRefresh = Date.now() + REFRESH_INTERVAL_MS;
  countdownTimer = setInterval(() => {
    const remaining = nextRefresh - Date.now();
    if (remaining <= 0) {
      refreshAll();
      nextRefresh = Date.now() + REFRESH_INTERVAL_MS;
      return;
    }
    const m = Math.floor(remaining / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    document.getElementById('countdown').textContent =
      `Actualiza en ${m}:${String(s).padStart(2, '0')}`;
  }, 1000);
}

function updateHeaderDate() {
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('header-date').textContent =
    new Date().toLocaleDateString('es-ES', opts);
}

// ── FETCH SOURCES FROM GOOGLE SHEETS ─────────────────────────────────────────
async function fetchSources() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();
  const rows = parseCSV(text);
  return rows
    .filter(r => r.length >= 2 && r[0].trim() && r[1].trim())
    .map(r => ({
      name: r[0].trim(),
      rss: r[1].trim(),
      logo: r[2] ? r[2].trim() : ''
    }));
}

function parseCSV(text) {
  return text.split('\n').map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { cols.push(cur); cur = ''; continue; }
      cur += ch;
    }
    cols.push(cur);
    return cols.map(c => c.trim());
  }).filter(r => r.some(c => c));
}

// ── FETCH RSS ─────────────────────────────────────────────────────────────────
async function fetchRSS(source) {
  const res = await fetch(source.rss);
  const text = await res.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, 'text/xml');
  const items = [...xml.querySelectorAll('item')].slice(0, MAX_ITEMS_PER_FEED);
  return items.map(item => {
    const title = item.querySelector('title')?.textContent?.trim() || '';
    const link = item.querySelector('link')?.textContent?.trim() || '';
    const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
    let desc = item.querySelector('description')?.textContent?.trim() || '';
    // Strip HTML tags from description
    desc = desc.replace(/<[^>]*>/g, '').replace(/&[a-z]+;/gi, ' ').trim();
    // Truncate to ~180 chars
    if (desc.length > 180) desc = desc.slice(0, 180).replace(/\s+\S*$/, '') + '…';
    return {
      title,
      link,
      desc,
      date: pubDate ? new Date(pubDate) : new Date(0),
      dateStr: pubDate ? formatDate(new Date(pubDate)) : '',
      source: source.name,
      logo: source.logo
    };
  });
}

function formatDate(d) {
  if (isNaN(d.getTime())) return '';
  const now = new Date();
  const diffH = (now - d) / 3600000;
  if (diffH < 1) return 'Hace ' + Math.round(diffH * 60) + ' min';
  if (diffH < 24) return 'Hace ' + Math.round(diffH) + 'h';
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
}

// ── REFRESH ALL ───────────────────────────────────────────────────────────────
async function refreshAll() {
  const btn = document.getElementById('btn-refresh');
  btn.disabled = true;
  document.getElementById('last-update').textContent = 'Actualizando…';
  showLoading();

  try {
    sources = await fetchSources();
    buildFilterBar(sources);

    const results = await Promise.allSettled(sources.map(fetchRSS));
    allItems = [];
    results.forEach((r, i) => {
      if (r.status === 'fulfilled') allItems.push(...r.value);
    });

    // Sort by date desc
    allItems.sort((a, b) => b.date - a.date);

    renderItems(allItems);
    const now = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('last-update').textContent = `Última actualización: ${now}`;
    startCountdown();
  } catch (e) {
    showError(e.message);
    document.getElementById('last-update').textContent = 'Error al actualizar.';
  }

  btn.disabled = false;
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function filterBySource(name, el) {
  activeSource = name;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const filtered = name === 'all' ? allItems : allItems.filter(i => i.source === name);
  renderItems(filtered);
}

function buildFilterBar(sources) {
  const bar = document.getElementById('filter-bar');
  // Remove old source buttons
  [...bar.querySelectorAll('[data-source]:not([data-source="all"])')].forEach(b => b.remove());
  sources.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.source = s.name;
    btn.textContent = s.name;
    btn.onclick = () => filterBySource(s.name, btn);
    bar.appendChild(btn);
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderItems(items) {
  const grid = document.getElementById('news-grid');
  document.getElementById('stats-count').textContent =
    items.length ? `${items.length} artículo${items.length !== 1 ? 's' : ''}` : '';

  if (!items.length) {
    grid.innerHTML = '<div class="state-msg"><p>No hay artículos disponibles.</p></div>';
    return;
  }

  grid.innerHTML = '';

  items.forEach((item, idx) => {
    if (idx === 0) {
      grid.appendChild(makeFeaturedCard(item));
    } else {
      grid.appendChild(makeCard(item));
    }
  });
}

function logoEl(item) {
  if (item.logo) {
    return `<img class="source-logo" src="${esc(item.logo)}" alt="${esc(item.source)}" onerror="this.replaceWith(fallbackLogo('${esc(item.source)}'))">`;
  }
  return `<span class="source-logo-fallback">${esc(item.source)}</span>`;
}

function makeFeaturedCard(item) {
  const div = document.createElement('div');
  div.className = 'news-card featured';
  div.innerHTML = `
    <div class="card-left">
      <div class="card-source">
        ${item.logo
          ? `<img class="source-logo" src="${esc(item.logo)}" alt="${esc(item.source)}" onerror="this.style.display='none';this.nextSibling.style.display='inline'">`
          : ''}
        <span class="source-logo-fallback" ${item.logo ? 'style="display:none"' : ''}>${esc(item.source)}</span>
        <span class="card-date">${item.dateStr}</span>
      </div>
      <div class="card-title">${esc(item.title)}</div>
      <div class="card-footer">
        <a class="lea-mas" href="${esc(item.link)}" target="_blank" rel="noopener">Lea más</a>
      </div>
    </div>
    <div class="divider-vert"></div>
    <div class="card-right">
      <div class="card-excerpt">${esc(item.desc)}</div>
    </div>`;
  return div;
}

function makeCard(item) {
  const div = document.createElement('div');
  div.className = 'news-card';
  div.innerHTML = `
    <div class="card-source">
      ${item.logo
        ? `<img class="source-logo" src="${esc(item.logo)}" alt="${esc(item.source)}" onerror="this.style.display='none';this.nextSibling.style.display='inline'">`
        : ''}
      <span class="source-logo-fallback" ${item.logo ? 'style="display:none"' : ''}>${esc(item.source)}</span>
      <span class="card-date">${item.dateStr}</span>
    </div>
    <div class="card-title">${esc(item.title)}</div>
    <div class="card-excerpt">${esc(item.desc)}</div>
    <div class="card-footer">
      <a class="lea-mas" href="${esc(item.link)}" target="_blank" rel="noopener">Lea más</a>
    </div>`;
  return div;
}

function showLoading() {
  document.getElementById('news-grid').innerHTML =
    '<div class="state-msg"><div class="spinner"></div><p>Cargando noticias…</p></div>';
}

function showError(msg) {
  document.getElementById('news-grid').innerHTML =
    `<div class="state-msg"><p>Error al cargar: ${esc(msg)}</p><p style="margin-top:.5rem;font-size:.8rem">Verifica que el ID de la hoja de cálculo sea correcto y que esté publicada.</p></div>`;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
